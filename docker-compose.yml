version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: perla-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
  backend:
    build: ./backend
    container_name: perla-backend
    depends_on:
      - mongodb
    environment:
      - MONGO_HOST=mongodb
  frontend:
    build: ./frontend
    container_name: perla-frontend
    ports:
      - "8501:8501"
    depends_on:
      - mongodb
    environment:
      - MONGO_HOST=mongodb
volumes:
  mongo_data: